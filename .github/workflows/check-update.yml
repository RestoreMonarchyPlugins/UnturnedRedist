name: Check for Unturned Updates

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current version from nuspec
        id: current
        run: |
          VERSION=$(grep -oP '(?<=<version>)[^<]+' unturned/RestoreMonarchy.UnturnedRedist.nuspec)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Get latest Unturned version from Steam
        id: latest
        run: |
          # Download just the Status.json to check version
          wget -q https://github.com/SteamRE/DepotDownloader/releases/latest/download/DepotDownloader-linux-x64.zip
          unzip -q DepotDownloader-linux-x64.zip -d depotdownloader
          chmod +x depotdownloader/DepotDownloader

          # Download only Status.json using file filter
          ./depotdownloader/DepotDownloader -app 1110390 -depot 1110393 -os linux -dir temp_download -filelist <(echo "Status.json")

          STATUS_FILE=$(find temp_download -name "Status.json" | head -1)
          if [ -f "$STATUS_FILE" ]; then
            MAJOR=$(jq -r '.Game.Major_Version' "$STATUS_FILE")
            MINOR=$(jq -r '.Game.Minor_Version' "$STATUS_FILE")
            PATCH=$(jq -r '.Game.Patch_Version' "$STATUS_FILE")
            VERSION="3.${MAJOR}.${MINOR}.${PATCH}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Latest version: $VERSION"
          else
            echo "Failed to get Status.json"
            exit 1
          fi

      - name: Compare versions and trigger update
        if: steps.current.outputs.version != steps.latest.outputs.version
        run: |
          echo "New version available: ${{ steps.latest.outputs.version }} (current: ${{ steps.current.outputs.version }})"
          echo "Triggering update workflow..."

      - name: Trigger update workflow
        if: steps.current.outputs.version != steps.latest.outputs.version
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'update-redist.yml',
              ref: 'master'
            });
            console.log('Update workflow triggered for version ${{ steps.latest.outputs.version }}');
